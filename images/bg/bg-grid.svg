<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Base -->
  <rect width="40" height="40" fill="#0a0a0a" />

  <!-- Grid: vertical lines -->
  <line x1="0" y1="0" x2="0" y2="40" stroke="#1a1a1e" stroke-width="1" opacity="0.35" />
  <line x1="40" y1="0" x2="40" y2="40" stroke="#1a1a1e" stroke-width="1" opacity="0.35" />

  <!-- Grid: horizontal lines -->
  <line x1="0" y1="0" x2="40" y2="0" stroke="#1a1a1e" stroke-width="1" opacity="0.35" />
  <line x1="0" y1="40" x2="40" y2="40" stroke="#1a1a1e" stroke-width="1" opacity="0.35" />
</svg>
