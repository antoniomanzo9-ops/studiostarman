<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="high-freq-noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="5" result="noise" seed="42" />
      <feComponentTransfer in="noise">
        <feFuncA type="linear" slope="0.02" />
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="100" height="100" fill="#0a0a0a" />

  <!-- High-frequency noise overlay -->
  <rect width="100" height="100" fill="#ffffff" opacity="0.02" filter="url(#high-freq-noise)" />

  <!-- Additional noise particles for variation -->
  <circle cx="12" cy="34" r="0.15" fill="#1a1a1e" opacity="0.015" />
  <circle cx="45" cy="67" r="0.12" fill="#1a1a1e" opacity="0.018" />
  <circle cx="78" cy="23" r="0.18" fill="#1a1a1e" opacity="0.012" />
  <circle cx="23" cy="89" r="0.14" fill="#1a1a1e" opacity="0.016" />
  <circle cx="91" cy="56" r="0.16" fill="#1a1a1e" opacity="0.014" />
  <circle cx="34" cy="12" r="0.13" fill="#1a1a1e" opacity="0.017" />
  <circle cx="67" cy="78" r="0.15" fill="#1a1a1e" opacity="0.019" />
  <circle cx="8" cy="45" r="0.11" fill="#1a1a1e" opacity="0.013" />
  <circle cx="56" cy="34" r="0.14" fill="#1a1a1e" opacity="0.015" />
  <circle cx="87" cy="91" r="0.17" fill="#1a1a1e" opacity="0.016" />
</svg>
