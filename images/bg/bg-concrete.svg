<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="concrete-noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" result="noise" seed="1" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <!-- Base -->
  <rect width="200" height="200" fill="#0a0a0a" />

  <!-- Concrete texture layer 1: coarse grain -->
  <rect width="200" height="200" fill="#0a0a0a" opacity="1" />
  <circle cx="25" cy="35" r="1.2" fill="#1a1a1e" opacity="0.04" />
  <circle cx="67" cy="82" r="0.8" fill="#1a1a1e" opacity="0.045" />
  <circle cx="145" cy="28" r="1.5" fill="#1a1a1e" opacity="0.035" />
  <circle cx="88" cy="156" r="1" fill="#1a1a1e" opacity="0.042" />
  <circle cx="172" cy="104" r="0.9" fill="#1a1a1e" opacity="0.038" />
  <circle cx="12" cy="178" r="1.3" fill="#1a1a1e" opacity="0.04" />
  <circle cx="198" cy="45" r="1.1" fill="#1a1a1e" opacity="0.041" />
  <circle cx="134" cy="195" r="0.7" fill="#1a1a1e" opacity="0.039" />

  <!-- Concrete texture layer 2: micro pitting -->
  <circle cx="43" cy="12" r="0.6" fill="#252525" opacity="0.035" />
  <circle cx="91" cy="64" r="0.5" fill="#252525" opacity="0.033" />
  <circle cx="156" cy="138" r="0.7" fill="#252525" opacity="0.037" />
  <circle cx="22" cy="105" r="0.4" fill="#252525" opacity="0.032" />
  <circle cx="179" cy="171" r="0.55" fill="#252525" opacity="0.034" />
  <circle cx="64" cy="189" r="0.65" fill="#252525" opacity="0.036" />
  <circle cx="112" cy="41" r="0.48" fill="#252525" opacity="0.031" />
  <circle cx="38" cy="147" r="0.7" fill="#252525" opacity="0.038" />
  <circle cx="169" cy="79" r="0.52" fill="#252525" opacity="0.035" />

  <!-- Concrete texture layer 3: fine dust -->
  <circle cx="55" cy="23" r="0.3" fill="#1a1a1e" opacity="0.025" />
  <circle cx="103" cy="97" r="0.2" fill="#1a1a1e" opacity="0.022" />
  <circle cx="188" cy="156" r="0.35" fill="#1a1a1e" opacity="0.028" />
  <circle cx="9" cy="69" r="0.25" fill="#1a1a1e" opacity="0.021" />
  <circle cx="141" cy="114" r="0.3" fill="#1a1a1e" opacity="0.026" />
  <circle cx="76" cy="35" r="0.28" fill="#1a1a1e" opacity="0.024" />
  <circle cx="120" cy="163" r="0.22" fill="#1a1a1e" opacity="0.023" />
  <circle cx="48" cy="78" r="0.32" fill="#1a1a1e" opacity="0.027" />

  <!-- Concrete texture layer 4: subtle streaks -->
  <line x1="0" y1="52" x2="200" y2="48" stroke="#1a1a1e" stroke-width="0.5" opacity="0.018" />
  <line x1="0" y1="127" x2="200" y2="131" stroke="#1a1a1e" stroke-width="0.4" opacity="0.015" />
  <line x1="0" y1="73" x2="200" y2="71" stroke="#252525" stroke-width="0.3" opacity="0.012" />
</svg>
